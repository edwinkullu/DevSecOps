{{- define "common.serviceAccount" -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ default .Values.namespace .Values.global.namespace }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | default (printf "%s-%s-gke-sa@%s.iam.gserviceaccount.com" "postpilot" .Values.global.env_suffix .Values.global.project_id) }}
{{- end }}
{{- end -}}
