{{- define "common.externalSecret" -}}
{{- if .Values.global.gsm.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "common.fullname" . }}-gsm-sync
  namespace: {{ default .Values.namespace .Values.global.namespace }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: {{ include "common.fullname" . }}-gsm-sync
    creationPolicy: Owner
  {{- if and .Values.gsm .Values.gsm.mappings }}
  data:
  {{- range .Values.gsm.mappings }}
  - secretKey: {{ .secretKey }}
    remoteRef:
      key: {{ .remoteKey }}
  {{- end }}
  {{- end }}
  dataFrom:
  {{- if and .Values.gsm .Values.gsm.secrets }}
    {{- range .Values.gsm.secrets }}
    - extract:
        key: {{ .name }}
    {{- end }}
  {{- else }}
    # AUTO-DISCOVERY MODE: Find secrets by labels
    {{- $gsmServiceName := .Release.Name -}}
    {{- if .Values.gsm }}{{ if .Values.gsm.serviceName }}{{ $gsmServiceName = .Values.gsm.serviceName }}{{ end }}{{ end }}
    - find:
        tags:
          postpilot-service: {{ $gsmServiceName }}
          postpilot-env: {{ .Values.global.environment }}
      rewrite:
        - regexp:
            source: "^({{ $gsmServiceName }}|{{ $gsmServiceName | upper | replace "-" "_" }})[-_]"
            target: ""
    - find:
        tags:
          postpilot-service: global
          postpilot-env: {{ .Values.global.environment }}
      rewrite:
        - regexp:
            source: "^(global|GLOBAL)[-_]"
            target: ""
  {{- end }}
{{- end }}
{{- end -}}
