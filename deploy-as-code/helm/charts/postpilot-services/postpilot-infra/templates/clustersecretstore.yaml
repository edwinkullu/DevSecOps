apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-store
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.global.project_id }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.global.gsm.location | quote }}
          clusterName: {{ .Values.global.gsm.cluster_name | quote }}
          serviceAccountRef:
            name: postpilot-app-sa
            namespace: postpilot
