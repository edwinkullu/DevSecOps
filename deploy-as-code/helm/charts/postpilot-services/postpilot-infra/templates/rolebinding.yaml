apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-operator-wi
  namespace: {{ .Release.Namespace | default "postpilot" }}
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-operator-wi-binding
  namespace: {{ .Release.Namespace | default "postpilot" }}
  annotations:
    description: "Allows the External Secrets operator to impersonate service accounts in this namespace for Workload Identity."
subjects:
- kind: ServiceAccount
  name: external-secrets
  namespace: {{ .Values.externalSecretsNamespace | default "external-secrets" }}
roleRef:
  kind: Role
  name: external-secrets-operator-wi
  apiGroup: rbac.authorization.k8s.io
