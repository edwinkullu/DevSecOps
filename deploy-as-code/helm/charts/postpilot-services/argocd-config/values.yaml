# Default values for argocd-config.
# This chart manages ArgoCD Applications and Projects.

global:
  domain: kullu.site
  repoUrl: git@github.com:edwinkullu/DevSecOps.git
  targetRevision: HEAD

projects:
  postpilot:
    description: "Main project for PostPilot microservices"
    sourceRepos:
      - "*"
    destinations:
      - server: https://kubernetes.default.svc
        namespace: postpilot
    clusterResourceWhitelist:
      - group: '*'
        kind: '*'

applications:
  - name: postpilot-fleet-prod
    project: postpilot
    source:
      path: deploy-as-code/helm
      targetRevision: HEAD
      helm:
        valueFiles:
          - environments/prod.yaml
    destination:
      server: https://kubernetes.default.svc
      namespace: postpilot
    syncPolicy:
      automated:
        prune: false # Safety: Manual sync for production
        selfHeal: true
    imageUpdater:
      imageList: "dashboard=asia-docker.pkg.dev/postpilot-0/postpilot/dashboard,api-server=asia-docker.pkg.dev/postpilot-0/postpilot/api-server,agent-engine=asia-docker.pkg.dev/postpilot-0/postpilot/agent-engine"
      extraArgs:
        "dashboard.update-strategy": "latest"
        "dashboard.allow-tags": "regexp:^[0-9]{8}-[0-9]{6}$"
        "api-server.update-strategy": "latest"
        "api-server.allow-tags": "regexp:^[0-9]{8}-[0-9]{6}$"
        "agent-engine.update-strategy": "latest"
        "agent-engine.allow-tags": "regexp:^[0-9]{8}-[0-9]{6}$"
