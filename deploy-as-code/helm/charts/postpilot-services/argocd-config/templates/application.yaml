{{- range .Values.applications }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  annotations:
    {{- if .imageUpdater }}
    argocd-image-updater.argoproj.io/image-list: {{ .imageUpdater.imageList }}
    argocd-image-updater.argoproj.io/write-back-method: {{ .imageUpdater.writeBackMethod | default "argocd" }}
    {{- range $key, $val := .imageUpdater.extraArgs }}
    argocd-image-updater.argoproj.io/{{ $key }}: {{ $val | quote }}
    {{- end }}
    {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .project }}
  source:
    repoURL: {{ .source.repoUrl | default $.Values.global.repoUrl }}
    targetRevision: {{ .source.targetRevision | default $.Values.global.targetRevision }}
    {{- if .source.path }}
    path: {{ .source.path }}
    {{- end }}
    {{- if .source.chart }}
    chart: {{ .source.chart }}
    {{- end }}
    {{- if .source.helm }}
    helm:
      {{- if .source.helm.releaseName }}
      releaseName: {{ .source.helm.releaseName }}
      {{- end }}
      {{- if .source.helm.valueFiles }}
      valueFiles:
{{ toYaml .source.helm.valueFiles | indent 8 }}
      {{- end }}
      {{- if .source.helm.values }}
      values: |
{{ .source.helm.values | indent 8 }}
      {{- end }}
    {{- end }}
  destination:
    server: {{ .destination.server | default "https://kubernetes.default.svc" }}
    namespace: {{ .destination.namespace | default "postpilot" }}
  syncPolicy:
{{ toYaml .syncPolicy | indent 4 }}
---
{{- end }}
