{{- if .Values.gateway.enabled }}
{{- range $urlKey, $host := .Values.global.host_urls }}
{{- $serviceName := index $.Values.routeMapping $urlKey }}
{{- /* Only generate route if we have a valid host and a mapped service name */ -}}
{{- if and $host $serviceName }}

---
# 1. MAIN HTTPS ROUTE (Traffic + CDN)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-%s" $.Values.gateway.name ($urlKey | replace "_" "-") | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $serviceName }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.namespace }}
      sectionName: https
  hostnames:
    - {{ $host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      
      {{- /* CDN Control: Check global switch AND per-service override from root services map */ -}}
      {{- $serviceValues := index ($.Values.services | default dict) $serviceName | default dict -}}
      {{- if and $.Values.global.gateway.cdn.enabled (ne $serviceValues.cdn_enabled false) }}
      {{- $filterName := printf "%s-cdn-filter" $.Values.gateway.name -}}
      {{- if eq $serviceValues.cdn_mode "dynamic" }}
      {{- $filterName = printf "%s-cdn-filter-dynamic" $.Values.gateway.name -}}
      {{- end }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: networking.gke.io
            kind: GCPHTTPFilter
            name: {{ $filterName }}
      {{- end }}

      backendRefs:
        - name: {{ $serviceName }}
          port: 80

---
# 2. HTTP TO HTTPS REDIRECT ROUTE
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-%s-redirect" $.Values.gateway.name ($urlKey | replace "_" "-") | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $serviceName }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.namespace }}
      sectionName: http
  hostnames:
    - {{ $host | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
{{- end }}
{{- end }}