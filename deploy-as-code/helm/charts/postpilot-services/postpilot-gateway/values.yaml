namespace: postpilot

gateway:
  enabled: true
  name: postpilot-gateway
  className: ""
  certMap: ""
  staticIpName: ""
  allowHttp: true
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
    - name: http
      protocol: HTTP
      port: 80

serviceAccount:
  create: true
  name: "postpilot-app-sa"

# Master Route Mapping: Links environment URL keys to service names.
# This makes the Gateway environment-aware (UAT vs Prod).
routeMapping:
  # Example: Link the 'example_url' defined in your environment to the 'example-service'
  # example_url: "example-service"
