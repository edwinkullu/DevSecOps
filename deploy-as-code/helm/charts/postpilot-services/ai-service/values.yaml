# values.yaml for ai-service (v1.0.2-env-aware)
common:
  nameOverride: ''
  fullnameOverride: ''

namespace: cbmo
servicePort: 80
httpPort: 8000
replicas: 2

# GCP Load Balancer timeout (extended to 5 minutes for AI generation)
timeoutSec: 300
trafficDuration: LONG
balancingMode: IN_FLIGHT

global:
  gsm:
    enabled: true
  project_id: "glassy-storm-491011-q6"
  env_suffix: "uat"
  cert_map: "cbmo-uat-cert-map"

serviceAccount:
  create: false
  name: "cbmo-app-sa"

ingress:
  enabled: false
  hostName: "ai-service.cbmo.ai"

# Auto-Sync Enabled: Monitoring 'cbmo-service' labels in GCP Secret Manager

image:
  repository: aiservice
  tag: ""
  pullPolicy: Always
extraVolumeMounts: |
  - name: logs
    mountPath: /app/logs
extraVolumes: |
  - name: logs
    emptyDir: {}

env: '{{ .Values.global.env }}'

# Default resources (Overridden by stage.yaml via common chart)
cpu_requests: "500m"
memory_requests: "3Gi"
cpu_limits: "2000m"
memory_limits: "5Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  memoryThreshold: 70



