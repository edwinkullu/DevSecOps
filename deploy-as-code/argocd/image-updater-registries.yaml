apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  # Tell Image Updater to use the GCP credential helper for Artifact Registry.
  # The argocd-image-updater ServiceAccount is bound (via Workload Identity) to
  # the postpilot-prod-gke-sa GSA which has roles/artifactregistry.reader.
  # NOTE: key must be "registries.conf" (not registries.yaml) — that is the key
  # the Image Updater Deployment mounts and reads automatically.
  registries.conf: |
    registries:
    - name: Google Artifact Registry (asia)
      api_url: https://asia-docker.pkg.dev
      prefix: asia-docker.pkg.dev
      credentials: ext:/scripts/gcloud-auth.sh
      credsexpire: 10m
      insecure: false
  # Shell script to fetch a short-lived Google OAuth2 token via the metadata server.
  # Works because the pod's KSA is annotated with the GSA that has AR reader rights.
  # Uses wget (curl is not present in the argocd-image-updater image).
  # Mounted at /scripts/gcloud-auth.sh with mode 0755 via Deployment patch.
  gcloud-auth.sh: |
    #!/bin/sh
    TOKEN=$(wget -qO- \
      --header="Metadata-Flavor: Google" \
      "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
      | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
    echo "oauth2accesstoken:${TOKEN}"
