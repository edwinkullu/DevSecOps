# ==============================================================================
# Master CI Orchestrator for POSTPILOT microservices fleet.
# Optimized for high-speed, dashboard-driven building and CD triggering.
# ==============================================================================
steps:
  # 1. INITIALIZE: Generate build tag and status tracking log
  - name: 'gcr.io/cloud-builders/docker'
    id: 'generate-build-tag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -eu
        TAG=$$(date +%Y%m%d-%H%M%S)
        echo "$$TAG" > /workspace/tag.txt
        
        # No services to track currently. 
        echo "Master build started for template." > /workspace/status.log

        echo "==> Generated Shared Tag: $$TAG"
        echo "==> Targeted Fleet: ${_SERVICES}"

  # 2. PRE-FETCH SECURITY DATABASE
  - id: 'trivy-db-init'
    name: 'aquasec/trivy:0.55.2'
    waitFor: ['generate-build-tag']
    entrypoint: 'trivy'
    args: ['image', '--download-db-only', '--cache-dir', '/workspace/.trivycache']

  # 3. IaC SCAN: Global infrastructure audit
  - id: 'iac-scan'
    name: 'bridgecrew/checkov:latest'
    waitFor: ['generate-build-tag']
    args: ['-d', '.', '--quiet', '--compact', '--soft-fail']

  # ----------------------------------------------------------------------------
  # SERVICES SECTION
  # Add new microservice build steps here.
  # ----------------------------------------------------------------------------

  # ----------------------------------------------------------------------------
  # FINALIZATION: CD Dispatch & Summary
  # ----------------------------------------------------------------------------
  
  # 3. CD DISPATCH: Asynchronously trigger the single CD worker bundle
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    id: 'trigger-batch-deployments'
    waitFor: ['iac-scan']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        TAG=$$(cat /workspace/tag.txt)
        SVCS=$$(echo "${_SERVICES}" | tr '_' '-')
        ALL_RELEASES="infra gateway"
        
        # Bundle all targeted services into a single string
        TARGET_SERVICES=""
        for svc in $$ALL_RELEASES; do
          if [[ "$$SVCS" == *"$$svc"* || "$$SVCS" == "all" ]]; then
            TARGET_SERVICES="$$TARGET_SERVICES $$svc"
          fi
        done
        
        # Clean the string (remove leading space)
        TARGET_SERVICES=$$(echo $$TARGET_SERVICES | sed 's/^ //')

        if [[ -n "$$TARGET_SERVICES" ]]; then
          echo "  - [BUNDLE DISPATCH] Handing over [$$TARGET_SERVICES] to ${_CD_TRIGGER_NAME}..."
          gcloud beta builds triggers run "${_CD_TRIGGER_NAME}" \
            --project "${PROJECT_ID}" \
            --region "${LOCATION}" \
            --branch "${BRANCH_NAME}" \
            --substitutions="_TARGET_SERVICES=$$TARGET_SERVICES,_IMAGE_TAG=$$TAG"
        else
          echo "  - [SKIPPED] No services targeted for deployment."
        fi

  # 4. REPORT: Print final building summary
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    id: 'build-summary'
    waitFor: ['trigger-batch-deployments']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo ""
        echo "============================================================"
        echo "              POSTPILOT FLEET BUILD STATUS SUMMARY               "
        echo "============================================================"
        if [ -f /workspace/status.log ]; then
          cat /workspace/status.log | tr ':' '\t' | expand -t 31
        else
          echo "Build completed successfully."
        fi
        echo "============================================================"

substitutions:
  _REPORTS_BUCKET: 'postpilot-ai'
  _DEBUG: 'false'
  _SERVICES: 'all'
  _BRANCH: 'main'
  _REGISTRY_URL: 'us-central1-docker.pkg.dev/postpilot-dev/postpilot-fleet'
  _ENV: 'prod'

availableSecrets:
  secretManager:
    - versionName: projects/69548092470/secrets/GITHUB_TOKEN/versions/latest
      env: 'GITHUB_TOKEN'
    - versionName: projects/69548092470/secrets/SONAR_TOKEN/versions/latest
      env: 'SONAR_TOKEN'

options:
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY

artifacts:
  objects:
    location: 'gs://${_REPORTS_BUCKET}/security-reports/$$BUILD_ID'
    paths:
      - '/workspace/reports/**'
